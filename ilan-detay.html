<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F0F2F5">
  <title>İlan Detay — Zühre Yatırım</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <style>
    html,
    body {
      background: var(--bg-card) !important;
    }

    /* Base Layout */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 2rem 10vw;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--text-main);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .listing-layout {
      display: flex;
      padding: 0 10vw 4rem;
      gap: 2rem;
    }

    .map-layout {
      padding: 0 10vw 4rem;
    }

    .listing-gallery {
      flex: 0 0 78%;
      max-width: 78%;
    }

    .listing-sidebar {
      flex: 0 0 20%;
      max-width: 20%;
      position: sticky;
      top: 2rem;
      align-self: flex-start;
    }

    /* Gallery */
    .gallery-main {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
      margin-bottom: 0.75rem;
      position: relative;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.4s ease;
    }

    .gallery-counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-main);
    }

    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--gold-border);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-main);
    }

    .gallery-arrow:hover {
      border-color: var(--gold);
      background: #FFF;
    }

    .gallery-arrow svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .gallery-arrow--prev {
      left: 1rem;
    }

    .gallery-arrow--next {
      right: 1rem;
    }

    .gallery-thumbs {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .gallery-thumbs::-webkit-scrollbar {
      height: 4px;
    }

    .gallery-thumbs::-webkit-scrollbar-track {
      background: var(--bg-card);
    }

    .gallery-thumbs::-webkit-scrollbar-thumb {
      background: var(--gold-dim);
      border-radius: 4px;
    }

    .thumb {
      flex: 0 0 100px;
      height: 65px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.5;
      transition: all 0.3s;
      background: var(--bg-hover);
    }

    .thumb.active {
      border-color: var(--gold);
      opacity: 1;
    }

    .thumb:hover {
      opacity: 0.85;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-expand {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-main);
      transition: all 0.3s;
      z-index: 10;
    }
    
    .gallery-expand:hover {
      background: #FFF;
      color: var(--gold);
    }
    
    .gallery-expand svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    /* Lightbox Modal */
    #lightboxModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(5px);
      user-select: none;
      -webkit-user-select: none;
    }
    .lightbox-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      cursor: pointer;
    }
    #lightboxImage {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
      z-index: 100000;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 2rem; right: 3rem;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      z-index: 100001;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 100001;
      transition: all 0.3s;
    }
    .lightbox-arrow:hover {
      background: rgba(255,255,255,0.2);
      border-color: white;
    }
    .lightbox-arrow svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .lightbox-arrow--prev { left: 2rem; }
    .lightbox-arrow--next { right: 2rem; }
    .lightbox-counter {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 1rem;
      letter-spacing: 0.1em;
      z-index: 100001;
    }
    @media (max-width: 768px) {
      .lightbox-arrow--prev { left: 0.5rem; }
      .lightbox-arrow--next { right: 0.5rem; }
      .lightbox-close { top: 1rem; right: 1.5rem; }
      #lightboxImage { max-width: 100%; max-height: 80vh; border-radius: 0; }
      .listing-description { padding: 1.5rem; }
    }


    /* Description */
    .listing-description {
      margin-top: 2rem;
      background: var(--bg);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 3rem;
    }

    .listing-description h2 {
      font-size: 1.6rem;
      margin-bottom: 1.2rem;
    }

    .listing-description p {
      color: var(--text-muted);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    /* Sidebar */
    .sidebar-card {
      background: var(--bg);
      border: 1px solid var(--gold-border);
      border-radius: 4px;
      padding: 2rem 1.5rem;
    }

    .sidebar-price {
      font-family: var(--heading-font);
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .sidebar-price-note {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    .sidebar-title {
      font-family: var(--heading-font);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-main);
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .sidebar-loc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .sidebar-loc svg {
      width: 14px;
      height: 14px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
    }

    .sidebar-specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--gold-border);
      margin-bottom: 2rem;
    }

    .spec-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--gold-dim);
    }

    .spec-item:nth-child(odd) {
      padding-right: 0.8rem;
    }

    .spec-item:nth-child(even) {
      padding-left: 0.8rem;
      border-left: 1px solid var(--gold-dim);
    }

    .spec-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .spec-value {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text-main);
    }

    .sidebar-divider {
      height: 1px;
      background: var(--gold-border);
      margin: 1.2rem 0;
    }

    .sidebar-phone {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .sidebar-phone:hover {
      color: var(--text-main);
    }

    .sidebar-phone svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    @media (max-width: 1024px) {
      .listing-layout {
        flex-direction: column;
        padding: 0 1.5rem 3rem;
        display: flex;
        gap: 1.5rem;
      }
      
      .map-layout {
        padding: 0 1.5rem 3rem;
      }

      .listing-gallery {
        display: contents;
      }

      .gallery-main {
        order: 1;
        margin-bottom: 0;
      }

      .gallery-thumbs {
        order: 2;
      }

      .listing-sidebar {
        order: 3;
        position: static;
        width: 100%;
        max-width: 100%;
        flex: auto;
      }

      .listing-description {
        order: 4;
        padding-top: 2rem;
        margin-top: 1rem;
      }
    }
  </style>
</head>

<body>
