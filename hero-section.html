<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero — Serik Emlak</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0C0B09;
    --cream: #E8E0D0;
    --gold: #B8976A;
    --gold-dim: rgba(184, 151, 106, 0.15);
    --text-muted: #6B6560;
  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--cream);
    overflow: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 100;
  }

  /* ── Subtle geometric texture ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  /* Abstract architectural lines — background */
  .hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(90deg, transparent 0%, var(--gold-dim) 30%, rgba(184, 151, 106, 0.1) 60%, transparent 100%),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 119px,
        rgba(184, 151, 106, 0.05) 119px,
        rgba(184, 151, 106, 0.05) 120px
      );
    opacity: 0;
    animation: fadeLines 2.5s ease-out 0.8s forwards;
  }

  /* Diagonal accent lines — multiple for depth */
  .hero::after {
    content: '';
    position: absolute;
    top: -20%;
    right: 22%;
    width: 1px;
    height: 140%;
    background: linear-gradient(180deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
    opacity: 0;
    transform: rotate(15deg);
    animation: fadeIn 2s ease-out 1.4s forwards;
  }

  .line-2 {
    position: absolute;
    top: -10%;
    right: 45%;
    width: 1px;
    height: 130%;
    background: linear-gradient(180deg, transparent 0%, rgba(184, 151, 106, 0.3) 40%, rgba(184, 151, 106, 0.3) 60%, transparent 100%);
    transform: rotate(15deg);
    opacity: 0;
    animation: fadeIn 2s ease-out 1.8s forwards;
    pointer-events: none;
    z-index: 1;
  }

  .line-3 {
    position: absolute;
    top: -15%;
    right: 65%;
    width: 1px;
    height: 120%;
    background: linear-gradient(180deg, transparent 0%, rgba(184, 151, 106, 0.15) 35%, rgba(184, 151, 106, 0.15) 65%, transparent 100%);
    transform: rotate(15deg);
    opacity: 0;
    animation: fadeIn 2s ease-out 2.1s forwards;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Navigation ── */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2.5rem 4rem;
    opacity: 0;
    animation: slideDown 1s ease-out 0.3s forwards;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 0.08em;
    color: var(--cream);
  }

  .logo span {
    color: var(--gold);
  }

  .nav-links {
    display: flex;
    gap: 2.8rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.82rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.4s ease;
  }

  .nav-links a:hover {
    color: var(--cream);
  }

  /* ── Main content ── */
  .hero-content {
    position: relative;
    z-index: 10;
    padding: 0 4rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 800px;
  }

  .hero-tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 1s ease-out 0.6s forwards;
  }

  .hero-heading {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(2.8rem, 5.5vw, 4.8rem);
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--cream);
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 1.2s ease-out 0.9s forwards;
  }

  .hero-heading em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text-muted);
    max-width: 440px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 1s ease-out 1.3s forwards;
  }

  /* ── Bottom bar ── */
  .hero-bottom {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 4rem 2.5rem;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 2s forwards;
  }

  .scroll-hint {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .scroll-line {
    width: 48px;
    height: 1px;
    background: var(--gold);
    position: relative;
    overflow: hidden;
  }

  .scroll-line::after {
    content: '';
    position: absolute;
    left: -100%;
    width: 100%;
    height: 100%;
    background: var(--cream);
    animation: scrollPulse 2.5s ease-in-out infinite;
  }

  .contact-hint {
    text-align: right;
  }

  .contact-hint a {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .contact-hint a:hover {
    color: var(--cream);
  }

  .contact-hint a svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  /* ── Corner accents ── */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 2.2s forwards;
  }

  .corner--tl { top: 2rem; left: 4rem; border-top: 1px solid var(--gold-dim); border-left: 1px solid var(--gold-dim); }
  .corner--br { bottom: 2rem; right: 4rem; border-bottom: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }

  /* ── Floating orb (subtle depth) ── */
  .orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184, 151, 106, 0.07) 0%, transparent 70%);
    top: 10%;
    left: 25%;
    filter: blur(100px);
    animation: orbFloat 12s ease-in-out infinite;
    pointer-events: none;
  }

  /* ── Animations ── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(var(--ty, 30px)); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeLines {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scrollPulse {
    0% { left: -100%; }
    50% { left: 100%; }
    100% { left: 100%; }
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-30px, 20px) scale(1.05); }
    66% { transform: translate(20px, -15px) scale(0.97); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    nav { padding: 1.8rem 1.8rem; }
    .nav-links { display: none; }
    .hero-content { padding: 0 1.8rem; }
    .hero-bottom { padding: 0 1.8rem 2rem; }
    .corner--tl { left: 1.8rem; }
    .corner--br { right: 1.8rem; }
    .hero::before { width: 80%; }
    .hero::after { right: 10%; }
    .hero-heading { font-size: clamp(2.2rem, 8vw, 3.5rem); }
    .contact-hint { display: none; }
  }
</style>
</head>
<body>

<section class="hero">
  <!-- Subtle background elements -->
  <div class="orb"></div>
  <div class="line-2"></div>
  <div class="line-3"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>

  <!-- Navigation -->
  <nav>
    <div class="logo">ZÜHRE YATIRIM<span>.</span></div>
    <ul class="nav-links">
      <li><a href="#">Hakkımızda</a></li>
      <li><a href="#">İlanlar</a></li>
      <li><a href="#">Projeler</a></li>
      <li><a href="#">İletişim</a></li>
    </ul>
  </nav>

  <!-- Main heading -->
  <div class="hero-content">
    <p class="hero-tagline">Serik · Belek · Antalya</p>
    <h1 class="hero-heading">Toprağı tanır,<br><em>üstünü</em> inşa ederiz.</h1>
    <p class="hero-sub">Kat karşılığı inşaat ve gayrimenkul danışmanlığı.<br>Üç kişilik ekip, yirmi yıllık tecrübe.</p>
  </div>

  <!-- Bottom bar -->
  <div class="hero-bottom">
    <div class="scroll-hint">
      <span class="scroll-line"></span>
      Aşağı kaydır
    </div>
    <div class="contact-hint">
      <a href="#">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        WhatsApp
      </a>
    </div>
  </div>
</section>

</body>
</html>
